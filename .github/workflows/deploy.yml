name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Run backend tests ────────────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      ENV: development
      DATABASE_URL: sqlite:///./test.db   # lightweight DB for CI
      SECRET_KEY: ci-secret-not-real
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -x -q --tb=short

  # ── Run frontend type-check ──────────────────────────────────────────────────
  typecheck:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-vite/package-lock.json

      - run: npm ci
        working-directory: frontend-vite

      - run: npx tsc --noEmit
        working-directory: frontend-vite

  # ── Deploy to Northflank (main branch only) ─────────────────────────────────
  deploy:
    name: Deploy to Northflank
    needs: [test, typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Northflank build
        run: |
          curl -fsS -X POST \
            "https://api.northflank.com/v1/projects/${{ secrets.NORTHFLANK_PROJECT_ID }}/services/${{ secrets.NORTHFLANK_SERVICE_ID }}/build" \
            -H "Authorization: Bearer ${{ secrets.NORTHFLANK_API_KEY }}" \
            -H "Content-Type: application/json"
          echo "Build triggered on Northflank."
