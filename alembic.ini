; Alembic configuration for Lambda backend.
; This is minimal and delegates DB URL to env DATABASE_URL when possible.

[alembic]
script_location = alembic
sqlalchemy.url = postgresql://lambda_user:strongpassword123@localhost:5432/lambda_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

